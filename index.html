        body {

            background: linear-gradient(-45deg, #ffffff, #f3f4f6, #e5e7eb, #f9fafb);

        @keyframes gradientBG {

            100% { background-position: 0% 50%; }
        }

        /* 按鈕懸浮效果 */

        }
        .link-btn:hover {

            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }
        
        /* 隱藏捲軸但可滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
